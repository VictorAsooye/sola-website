name: Weekly Blog Post

on:
  schedule:
    - cron: "0 13 * * 1"   # Monday    08:00 EST
    - cron: "0 13 * * 3"   # Wednesday 08:00 EST
    - cron: "0 13 * * 5"   # Friday    08:00 EST
  workflow_dispatch:        # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Pick keyword for this run
        id: keyword
        run: |
          KEYWORDS=(
            # — Custom Portals & Intranets —
            "custom intranet solution for small business"
            "internal portal for small business"
            "employee portal without IT department"
            "how to build a staff portal for my business"
            "best intranet for small team under 50 people"
            "intranet ROI for small business"
            "custom employee portal vs off the shelf software"
            "internal hub for growing business"
            "how to centralize business operations"
            "business operations portal under $500/month"
            "internal communication system for small business"
            "staff portal for service business"
            "document management portal for small team"
            "how to stop running business through email"
            "client and staff portal in one system"
            "replace group chat with internal portal"
            "internal operations software for small business"
            "affordable intranet for 10 person company"
            "business central hub software"
            "single platform for all business operations"
            # — AI Automation & Workflows —
            "AI automation for small business operations"
            "automated onboarding system for small business"
            "how to automate admin tasks in my business"
            "workflow automation for service business"
            "stop doing manual data entry small business"
            "AI tools for business owners without IT team"
            "automate employee scheduling small business"
            "business process automation under $200/month"
            "n8n automation for small business"
            "how to automate invoicing and follow ups"
            "custom automation vs Zapier for small business"
            "automate client intake process small business"
            "AI assistant for business owner daily tasks"
            "how much does business automation cost"
            "reduce admin work with AI small business"
            "automated reporting for small business"
            "connect all my business tools in one system"
            "AI powered operations for growing business"
            "how to scale operations without hiring more staff"
            "Power Automate vs custom solution small business"
            # — Healthcare & Home Health Admin —
            "internal portal for home health agency"
            "home health agency admin system"
            "AI automation for home health agency"
            "automated onboarding for home health caregivers"
            "HIPAA compliant staff portal small agency"
            "home health agency software without big contract"
            "caregiver document management system"
            "how to manage home health staff without chaos"
            "automate compliance tracking home health agency"
            "EVV compliance automation small agency"
            "custom software for home health agency owner"
            "replace paper forms home health agency"
            "staff scheduling portal home health"
            "affordable IT solutions for healthcare admin"
            "home health agency operations consultant"
            "digitize home health agency paperwork"
            "client intake automation healthcare small business"
            "how to reduce admin burden home health owner"
            "employee portal for caregivers"
            "home health agency IT consulting"
            # — Custom App Development —
            "custom app for small business operations"
            "affordable custom software small business"
            "build a custom tool for my business"
            "replace spreadsheets with custom software"
            "custom dashboard for business owner"
            "how much does a custom business app cost"
            "custom CRM for small service business"
            "off the shelf vs custom software small business"
            "web app for managing clients and staff"
            "internal tool builder for small business"
            "no code vs custom development small business"
            "business app consultant affordable"
            "how to digitize my business operations"
            "custom reporting tool for small business"
            "build internal tools without hiring developer"
            "progressive web app for small business"
            "IT consultant who builds custom tools"
            "automate client management with custom app"
            "small business software consultant Maryland"
            "custom business tools under $1000"
            # — General SMB Pain Points —
            "how to organize a growing small business"
            "business owner overwhelmed by admin work"
            "my team doesn't know where to find information"
            "how to stop running business through WhatsApp"
            "IT consultant for small business near me"
            "how to scale a service business with systems"
            "affordable IT consulting for small business owner"
            "business systems consultant small business"
            "how to get my team out of email and into a system"
            "operations consultant for growing small business"
            "small business digital transformation consultant"
            "how to build systems before hiring more people"
            "technology consultant for small business Maryland"
            "how to reduce chaos in a growing business"
            "small business needs IT help where to start"
            "what does an IT consultant do for small business"
            "outsource IT for small business cost"
            "operations consultant small business"
            "how to choose the right business software"
            "business owner needs systems not more hustle"
          )
          DAY=$(( $(date +%s) / 86400 ))
          INDEX=$(( DAY % ${#KEYWORDS[@]} ))
          KEYWORD="${KEYWORDS[$INDEX]}"
          echo "keyword=$KEYWORD" >> $GITHUB_OUTPUT
          echo "✅ Day $DAY → keyword $INDEX/${#KEYWORDS[@]}: $KEYWORD"

      - name: Generate and publish post
        run: node generate-post.js "${{ steps.keyword.outputs.keyword }}"
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_OWNER: VictorAsooye
          GITHUB_REPO: sola-website
          GITHUB_BRANCH: main
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
