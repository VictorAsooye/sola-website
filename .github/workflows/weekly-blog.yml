name: Weekly Blog Post

on:
  schedule:
    - cron: "0 13 * * 1"   # Monday    08:00 EST
    - cron: "0 13 * * 3"   # Wednesday 08:00 EST
    - cron: "0 13 * * 5"   # Friday    08:00 EST
  workflow_dispatch:        # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Pick keyword for this run
        id: keyword
        run: |
          KEYWORDS=(
            "SharePoint intranet for home health agency"
            "internal portal for small business"
            "employee portal for healthcare admin"
            "Power Automate workflows for small business"
            "AI automation for home health agency"
            "Microsoft 365 intranet setup guide"
            "how to build a staff portal without IT department"
            "automated onboarding system for home health"
            "SharePoint vs custom portal for small business"
            "internal hub for growing business"
            "intranet ROI for small business"
            "best internal portal for 10 person company"
            "how to centralize business operations"
          )
          # Use number of days since epoch so each M/W/F gets a different keyword
          DAY=$(( $(date +%s) / 86400 ))
          INDEX=$(( DAY % ${#KEYWORDS[@]} ))
          KEYWORD="${KEYWORDS[$INDEX]}"
          echo "keyword=$KEYWORD" >> $GITHUB_OUTPUT
          echo "✅ Day $DAY → keyword $INDEX: $KEYWORD"

      - name: Generate and publish post
        run: node generate-post.js "${{ steps.keyword.outputs.keyword }}"
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_OWNER: VictorAsooye
          GITHUB_REPO: sola-website
          GITHUB_BRANCH: main
